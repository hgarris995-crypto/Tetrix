        body {

<body>
    <canvas id="tetris" width="240" height="400"></canvas>

        // Game Variables
        const canvas = document.getElementById("tetris");
        const context = canvas.getContext("2d");
        context.scale(20, 20);
        
        // Set up game grid
        const arena = Array.from({length: 20}, () => Array(10).fill(0));
        
        // Define Tetrominoes shapes
        const pieces = [
            [1, 1, 1, 1], // I
            [1, 1, 0, 0, 1, 1], // O
            [0, 1, 1, 0, 1, 1], // S
            [1, 1, 0, 1, 0, 1], // T
            [1, 0, 0, 1, 1, 1]  // L
        ];

        // Game Functions
        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            // Draw arena
            arena.forEach(row => {
                row.forEach(value => {
                    if (value) {
                        context.fillStyle = "red";
                        context.fillRect(value % 10, Math.floor(value / 10), 1, 1);
                    }
                });
            });
        }

            }
        });

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
